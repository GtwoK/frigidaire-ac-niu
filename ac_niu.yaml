# ESPHome replacement for the Electrolux/Frigidaire NIU-LIGHT Wi-Fi module.

esphome:
  name: ac-niu
  friendly_name: Main Floor AC

esp32:
  variant: esp32c6
  framework:
    type: esp-idf

external_components:
  - source: github://gtwok/frigidaire-ac-niu@main
    components: [ac_niu_climate]

uart:
  id: ac_bus
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 9600
  data_bits: 8
  parity: EVEN
  stop_bits: 1
  rx_buffer_size: 1024

climate:
  - platform: ac_niu_climate
    id: ac_climate
    name: None
    uart_id: ac_bus
    child_lock:
      name: "Child Lock"
      icon: "mdi:account-lock"
    pureair_filter_installed:
      name: "PureAir Filter Installed"
      icon: "mdi:air-filter"
    coil_temperature:
      name: "Coil Temperature"
    air_quality_raw:
      name: "Air Quality Raw"
      icon: "mdi:air-filter"
    air_quality:
      name: "Air Quality"
      icon: "mdi:air-filter"
    filter_status:
      name: "Filter Status"
      icon: "mdi:air-filter"
    sleep_mode:
      name: "Sleep Mode"
      icon: "mdi:power-sleep"

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 10s
    entity_category: diagnostic

logger:
  level: INFO

api:
  reboot_timeout: 0s
  actions:
    # Advanced reverse-engineering hook. Example: "04 26 01" enables Eco mode.
    - action: set_ac_register
      variables:
        command: string
      then:
        - lambda: |-
            id(ac_climate).send_manual_set_hex(std::string(command));

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  
